  // Gemini 2.0 Flash, the old OpenRouter free Gemini alias, and Groq's Llama-4-Scout
  // vision model have all been retired by their providers — defaults below point at
  // their current, supported, vision-capable replacements as of mid-2026.
  gemini: { apiKey: '', model: 'gemini-3.6-flash' },
  openrouter: { apiKey: '', model: 'meta-llama/llama-4-maverick:free' },
  groq: { apiKey: '', model: 'qwen/qwen3.6-27b' },
  custom: { apiKey: '', model: '', baseUrl: '' },
};

function loadDB() {
  try {
    const raw = localStorage.getItem(LS_DB);
    if (!raw) throw new Error('empty');
    const parsed = JSON.parse(raw);
    return {
      analyses: parsed.analyses || [],
      bookmarks: parsed.bookmarks || [],
      adminConfig: { ...DEFAULT_ADMIN_CONFIG, ...(parsed.adminConfig || {}) },
    };
  } catch (e) {
    const fresh = { analyses: [], bookmarks: [], adminConfig: DEFAULT_ADMIN_CONFIG };
    localStorage.setItem(LS_DB, JSON.stringify(fresh));
    return fresh;
  }
}

function saveDB(db) {
  localStorage.setItem(LS_DB, JSON.stringify(db));
}

function loadKeys() {
  try {
    const raw = localStorage.getItem(LS_KEYS);
    if (!raw) throw new Error('empty');
    const parsed = JSON.parse(raw);
    return {
      provider: parsed.provider || 'gemini',
      gemini: { ...DEFAULT_KEYS.gemini, ...(parsed.gemini || {}) },
      openrouter: { ...DEFAULT_KEYS.openrouter, ...(parsed.openrouter || {}) },
      groq: { ...DEFAULT_KEYS.groq, ...(parsed.groq || {}) },
      custom: { ...DEFAULT_KEYS.custom, ...(parsed.custom || {}) },
    };
  } catch (e) {
    return { ...DEFAULT_KEYS };
  }
}

function saveKeys(keys) {
  localStorage.setItem(LS_KEYS, JSON.stringify(keys));
}

function hasAnyKey(keys) {
  return !!(keys.gemini.apiKey || keys.openrouter.apiKey || keys.groq.apiKey || (keys.custom && keys.custom.apiKey));
}

function providerOrder(keys) {
  // Try the selected provider first, then fall back to any other configured provider.
  const all = ['gemini', 'openrouter', 'groq', 'custom'];
  const withKey = all.filter(p => keys[p].apiKey);
  const ordered = [keys.provider, ...withKey.filter(p => p !== keys.provider)];
  return ordered.filter(p => keys[p].apiKey);
}

function dataUrlToParts(dataUrl) {
  const matches = String(dataUrl).match(/^data:([a-zA-Z0-9]+\/[a-zA-Z0-9-.+]+);base64,(.+)$/);
  if (matches && matches.length === 3) {
    return { mimeType: matches[1], data: matches[2] };
  }
  return { mimeType: 'image/png', data: dataUrl };
}

/* ============================================================
   AI PROVIDERS — Gemini (native) + OpenAI-compatible (OpenRouter, Groq)
   Keys never leave the browser except in direct calls to the
   provider's own API.
   ============================================================ */

async function callGemini({ apiKey, model, systemInstruction, contents, jsonMode }) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`;
  // Gemini 3.x supports a thinking budget and per-request media resolution control.
  // Higher resolution meaningfully improves the model's ability to read small axis
  // labels/price numbers off a chart screenshot, and "high" thinking helps it reason
  // through SMC structure/Fibonacci math before answering — both matter for accuracy here.
  const isGemini3 = /^gemini-3/.test(String(model));
  const body = {
    contents,
    ...(systemInstruction ? { systemInstruction: { parts: [{ text: systemInstruction }] } } : {}),
    generationConfig: {
      temperature: 0.3,
      ...(jsonMode ? { responseMimeType: 'application/json' } : {}),
      ...(isGemini3 ? { thinkingConfig: { thinkingLevel: 'high' }, mediaResolution: 'MEDIA_RESOLUTION_HIGH' } : {}),
    },
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) {
    throw new Error((data.error && data.error.message) || `Gemini error (${res.status})`);
  }
  const cand = data.candidates && data.candidates[0];
  const text = cand && cand.content && cand.content.parts
    ? cand.content.parts.map(p => p.text || '').join('')
    : '';
  if (!text) throw new Error('Gemini mengembalikan respons kosong (kemungkinan diblokir oleh safety filter).');
  return text;
}

async function callOpenAICompatible({ baseUrl, apiKey, model, systemPrompt, messages, jsonMode, extraHeaders }) {
  const body = {
    model,
    messages: [
      ...(systemPrompt ? [{ role: 'system', content: systemPrompt }] : []),
      ...messages,
    ],
    temperature: 0.3,
    ...(jsonMode ? { response_format: { type: 'json_object' } } : {}),
  };
  const res = await fetch(baseUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
      ...(extraHeaders || {}),
    },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) {
    throw new Error((data.error && (data.error.message || data.error)) || `API error (${res.status})`);
  }
  const content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
  if (!content) throw new Error('Provider mengembalikan respons kosong.');
  return content;
}

// Resolves the endpoint + headers for any OpenAI-compatible provider (OpenRouter, Groq,
// or a user-supplied custom endpoint — e.g. Together AI, Fireworks, DeepSeek, a local
// LM Studio/Ollama server, or any other OpenAI-compatible /chat/completions API).
function resolveOpenAICompatible(provider, cfg) {
  if (provider === 'openrouter') {
    return { baseUrl: 'https://openrouter.ai/api/v1/chat/completions', extraHeaders: { 'HTTP-Referer': location.origin, 'X-Title': 'RiL Gold AI' } };
  }
  if (provider === 'groq') {
    return { baseUrl: 'https://api.groq.com/openai/v1/chat/completions', extraHeaders: {} };
  }
  // custom
  return { baseUrl: cfg.baseUrl, extraHeaders: {} };
}

function cleanJsonText(text) {
  let cleaned = String(text).trim();
  if (cleaned.startsWith('```json')) {
    cleaned = cleaned.replace(/^```json/, '').replace(/```$/, '').trim();
  } else if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```/, '').replace(/```$/, '').trim();
  }
  // In case the model added stray prose around the JSON block
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace > 0 && lastBrace > firstBrace) {
    cleaned = cleaned.slice(firstBrace, lastBrace + 1);
  }
  return cleaned;
}

// Runs a single provider attempt for a "vision analyze" call (image(s) + instructions -> JSON)
async function tryAnalyzeWithProvider(provider, keys, systemPrompt, userPrompt, images) {
  const cfg = keys[provider];
  if (provider === 'gemini') {
    const parts = [
      ...images.map(img => {
        const { mimeType, data } = dataUrlToParts(img);
        return { inlineData: { mimeType, data } };
      }),
      { text: userPrompt },
    ];
    const text = await callGemini({
      apiKey: cfg.apiKey,
      model: cfg.model,
      systemInstruction: systemPrompt,
      contents: [{ role: 'user', parts }],
      jsonMode: true,
    });
    return text;
  }
  // OpenAI-compatible (OpenRouter / Groq / custom): image_url content blocks
  const content = [
    { type: 'text', text: userPrompt },
    ...images.map(img => ({ type: 'image_url', image_url: { url: img } })),
  ];
  const { baseUrl, extraHeaders } = resolveOpenAICompatible(provider, cfg);
  const text = await callOpenAICompatible({
    baseUrl,
    apiKey: cfg.apiKey,
    model: cfg.model,
    systemPrompt,
    messages: [{ role: 'user', content }],
    jsonMode: true,
    extraHeaders,
  });
  return text;
}

// Runs a single provider attempt for a chat/advisor call (message history -> text)
async function tryChatWithProvider(provider, keys, systemPrompt, historyMessages) {
  const cfg = keys[provider];
  if (provider === 'gemini') {
    const contents = historyMessages.map(m => ({
      role: m.sender === 'user' ? 'user' : 'model',
      parts: [
        { text: m.text || '' },
        ...(m.images || []).map(img => {
          const { mimeType, data } = dataUrlToParts(img);
          return { inlineData: { mimeType, data } };
        }),
      ],
    }));
    return await callGemini({
      apiKey: cfg.apiKey,
      model: cfg.model,
      systemInstruction: systemPrompt,
      contents,
      jsonMode: false,
    });
  }
  const messages = historyMessages.map(m => {
    const hasImages = m.images && m.images.length > 0;
    return {
      role: m.sender === 'user' ? 'user' : 'assistant',
      content: hasImages
        ? [{ type: 'text', text: m.text || '' }, ...m.images.map(img => ({ type: 'image_url', image_url: { url: img } }))]
        : (m.text || ''),
    };
  });
  const { baseUrl, extraHeaders } = resolveOpenAICompatible(provider, cfg);
  return await callOpenAICompatible({
    baseUrl,
    apiKey: cfg.apiKey,
    model: cfg.model,
    systemPrompt,
    messages,
    jsonMode: false,
    extraHeaders,
  });
}

async function generateAnalysis({ images, customNote, timeframePreference, keys, adminConfig }) {
  const order = providerOrder(keys);
  if (order.length === 0) {
    throw new Error('NO_API_KEY');
  }
  const timeframePrefString = timeframePreference ? `Preferred Target Setup timeframe: ${timeframePreference}.` : '';
  const userNoteString = customNote ? `User explicit observation/question: "${customNote}".` : '';
  const userPrompt = `
${adminConfig.analysisPrompt}

CONTEXT:
- Asset: XAUUSD (Gold)
- CRITICAL: You MUST read the exact current price, timeframe, and all price levels (Support, Resistance, Entry, Stop Loss, Take Profits) directly and exclusively from the uploaded chart image. Look at the y-axis (price scale on the right or left of the chart image) to map the exact price numbers. DO NOT make up or invent prices.
- ${timeframePrefString}
- ${userNoteString}

${ANALYSIS_JSON_SPEC}`;

  let lastError = null;
  for (const provider of order) {
    try {
      const raw = await tryAnalyzeWithProvider(provider, keys, adminConfig.systemPrompt, userPrompt, images);
      const cleaned = cleanJsonText(raw);
      const parsed = JSON.parse(cleaned);
      return { parsed, providerUsed: provider };
    } catch (err) {
      console.warn(`[RiL Gold AI] Provider ${provider} failed:`, err);
      lastError = err;
    }
  }
  throw lastError || new Error('Semua provider AI gagal merespons.');
}

async function generateChatReply({ messages, currentAnalysisContext, keys, adminConfig }) {
  const order = providerOrder(keys);
  if (order.length === 0) {
    throw new Error('NO_API_KEY');
  }
  let systemAddendum = '';
  if (currentAnalysisContext) {
    systemAddendum = `
User is currently viewing an active XAUUSD chart analysis:
- Title: ${currentAnalysisContext.title}
- Timeframe: ${currentAnalysisContext.timeframe}
- Current Chart Price: $${currentAnalysisContext.currentPrice}
- AI Trend Bias: ${currentAnalysisContext.trend}
- Signal Setup: ${currentAnalysisContext.tradingSetup && currentAnalysisContext.tradingSetup.type} (Entry: ${currentAnalysisContext.tradingSetup && currentAnalysisContext.tradingSetup.entryPrice}, SL: ${currentAnalysisContext.tradingSetup && currentAnalysisContext.tradingSetup.stopLoss}, TP1: ${currentAnalysisContext.tradingSetup && currentAnalysisContext.tradingSetup.takeProfit1})
- Market structure details: ${currentAnalysisContext.marketStructure && currentAnalysisContext.marketStructure.details}
Please answer user's questions utilizing this contextual gold analysis as reference if relevant.`;
  }
  const systemPrompt = `${adminConfig.systemPrompt}\n${adminConfig.tradingPrompt}\n${systemAddendum}`;

  let lastError = null;
  for (const provider of order) {
    try {
      const text = await tryChatWithProvider(provider, keys, systemPrompt, messages);
      return { text, providerUsed: provider };
    } catch (err) {
      console.warn(`[RiL Gold AI] Provider ${provider} failed:`, err);
      lastError = err;
    }
  }
  throw lastError || new Error('Semua provider AI gagal merespons.');
}

  if (!k) return '';
  if (k.length <= 8) return '••••••••';
  return k.slice(0, 4) + '••••••••' + k.slice(-4);
}

function App() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [showOnboarding, setShowOnboarding] = useState(false);

  const [db, setDb] = useState(() => loadDB());
  const [keys, setKeys] = useState(() => loadKeys());
  const [revealKey, setRevealKey] = useState({});

  const analyses = db.analyses;
  const bookmarks = db.bookmarks;
  const adminConfig = db.adminConfig;

  const [selectedAnalysis, setSelectedAnalysis] = useState(null);

  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [timeframePref, setTimeframePref] = useState('Intraday');
  const [customScannerNote, setCustomScannerNote] = useState('');
  const [isScanning, setIsScanning] = useState(false);
  const [scanError, setScanError] = useState(null);

  const [chatMessages, setChatMessages] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [isReplying, setIsReplying] = useState(false);
  const [chatFiles, setChatFiles] = useState([]);
  const chatBottomRef = useRef(null);

  const [bookmarkNote, setBookmarkNote] = useState('');
  const [showBookmarkModal, setShowBookmarkModal] = useState(false);

  const [dragActive, setDragActive] = useState(false);

  const quickChatPrompts = [
    "Apakah sekarang bagus BUY atau SELL Gold?",
    "Dimana area DEMAND XAUUSD terkuat saat ini?",
    "Bagaimana pandangan teknikal arah pergerakan Gold hari ini?",
    "Jelaskan area Support dan Resistance (SNR) terdekat.",
    "Apakah ada indikasi Change of Character (CHOCH) pada chart?"
  ];

  useEffect(() => {
    if (analyses.length > 0 && !selectedAnalysis) {
      setSelectedAnalysis(analyses[0]);
    }
    if (!hasAnyKey(keys)) {
      setShowOnboarding(true);
    }
    // eslint-disable-next-line
  }, []);

  useEffect(() => {
    chatBottomRef.current && chatBottomRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [chatMessages]);

  // ------- persistence helpers -------
  const updateDb = (updater) => {
    setDb(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveDB(next);
      return next;
    });
  };

  const updateKeys = (updater) => {
    setKeys(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveKeys(next);
      return next;
    });
  };

  // ------- ticker derived purely from last scan (no fake live feed) -------
  const ticker = useMemo(() => {
    const latest = analyses[0];
    if (!latest) return { price: 0, high: 0, low: 0, hasData: false };
    return {
      price: latest.currentPrice || 0,
      high: (latest.fibonacci && latest.fibonacci.anchorSwingHigh) || latest.currentPrice,
      low: (latest.fibonacci && latest.fibonacci.anchorSwingLow) || latest.currentPrice,
      hasData: true,
    };
  }, [analyses]);

  // ------- file handling -------
  const handleFileChange = (e, target) => {
    const files = e.target.files;
    if (!files) return;
    Array.from(files).forEach((file) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const base64 = reader.result;
        if (target === 'scanner') setUploadedFiles(prev => [...prev, { name: file.name, base64 }]);
        else setChatFiles(prev => [...prev, { name: file.name, base64 }]);
      };
      reader.readAsDataURL(file);
    });
  };

  const handleDrag = (e) => {
    e.preventDefault(); e.stopPropagation();
    if (e.type === 'dragenter' || e.type === 'dragover') setDragActive(true);
    else if (e.type === 'dragleave') setDragActive(false);
  };

  const handleDrop = (e) => {
    e.preventDefault(); e.stopPropagation();
    setDragActive(false);
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      Array.from(e.dataTransfer.files).forEach((file) => {
        const reader = new FileReader();
        reader.onloadend = () => setUploadedFiles(prev => [...prev, { name: file.name, base64: reader.result }]);
        reader.readAsDataURL(file);
      });
    }
  };

  // ------- vision scan -------
  const handleStartScan = async () => {
    if (uploadedFiles.length === 0) {
      setScanError("Silakan unggah minimal satu gambar chart XAUUSD.");
      return;
    }
    if (!hasAnyKey(keys)) {
      setScanError("Belum ada API key yang dikonfigurasi. Buka menu API KEYS untuk memasukkan key Anda.");
      setActiveTab('apikeys');
      return;
    }
    setIsScanning(true);
    setScanError(null);
    try {
      const imagesPayload = uploadedFiles.map(f => f.base64);
      const { parsed } = await generateAnalysis({
        images: imagesPayload,
        customNote: customScannerNote,
        timeframePreference: timeframePref,
        keys,
        adminConfig,
      });
      const finalResult = {
        id: 'an_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
        timestamp: new Date().toISOString(),
        ...parsed,
        images: imagesPayload,
      };
      updateDb(prev => {
        const nextAnalyses = [finalResult, ...prev.analyses].slice(0, 50);
        return { ...prev, analyses: nextAnalyses };
      });
      setSelectedAnalysis(finalResult);
      setUploadedFiles([]);
      setCustomScannerNote('');
      setActiveTab('dashboard');
    } catch (err) {
      if (err && err.message === 'NO_API_KEY') {
        setScanError("Belum ada API key yang dikonfigurasi. Buka menu API KEYS untuk memasukkan key Anda.");
        setActiveTab('apikeys');
      } else {
        setScanError((err && err.message) || "Gagal menghubungi AI provider.");
      }
    } finally {
      setIsScanning(false);
    }
  };

  // ------- chat -------
  const handleSendMessage = async (textToSend) => {
    const userText = textToSend || chatInput;
    if (!userText.trim() && chatFiles.length === 0) return;

    const userMessage = {
      id: 'usr_' + Date.now(),
      sender: 'user',
      text: userText,
      timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      images: chatFiles.map(f => f.base64),
    };

    const nextMessages = [...chatMessages, userMessage];
    setChatMessages(nextMessages);
    setChatInput('');
    setChatFiles([]);

    if (!hasAnyKey(keys)) {
      setChatMessages(prev => [...prev, {
        id: 'err_' + Date.now(),
        sender: 'assistant',
        text: "⚠️ Belum ada API key yang dikonfigurasi. Buka menu API KEYS untuk memasukkan key Anda terlebih dahulu.",
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      }]);
      return;
    }

    setIsReplying(true);
    try {
      const { text } = await generateChatReply({
        messages: nextMessages.map(m => ({ sender: m.sender, text: m.text, images: m.images })),
        currentAnalysisContext: selectedAnalysis,
        keys,

/* ============================================================
   API KEYS PANEL
   ============================================================ */
function ApiKeysPanel({ keys, updateKeys, revealKey, setRevealKey }) {
  const [testStatus, setTestStatus] = useState({});
  const [testing, setTesting] = useState({});

  const setProviderField = (provider, field, value) => {
    updateKeys(prev => ({ ...prev, [provider]: { ...prev[provider], [field]: value } }));
  };

  const setActiveProvider = (provider) => {
    updateKeys(prev => ({ ...prev, provider }));
  };

  const toggleReveal = (provider) => setRevealKey(prev => ({ ...prev, [provider]: !prev[provider] }));

  const testProvider = async (provider) => {
    setTesting(prev => ({ ...prev, [provider]: true }));
    setTestStatus(prev => ({ ...prev, [provider]: null }));
    try {
      const cfg = keys[provider];
      if (!cfg.apiKey) throw new Error('Isi API key terlebih dahulu.');
      if (provider === 'custom' && !cfg.baseUrl) throw new Error('Isi Base URL endpoint terlebih dahulu.');
      if (provider === 'gemini') {
        await callGemini({
          apiKey: cfg.apiKey, model: cfg.model,
          contents: [{ role: 'user', parts: [{ text: 'Reply with the single word: OK' }] }],
          jsonMode: false,
        });
      } else {
        const { baseUrl, extraHeaders } = resolveOpenAICompatible(provider, cfg);
        await callOpenAICompatible({
          baseUrl, apiKey: cfg.apiKey, model: cfg.model,
          messages: [{ role: 'user', content: 'Reply with the single word: OK' }],
          jsonMode: false,
          extraHeaders,
        });
      }
      setTestStatus(prev => ({ ...prev, [provider]: { ok: true, msg: 'Terhubung! Key & model valid.' } }));
    } catch (err) {
      setTestStatus(prev => ({ ...prev, [provider]: { ok: false, msg: (err && err.message) || 'Gagal terhubung.' } }));
    } finally {
      setTesting(prev => ({ ...prev, [provider]: false }));
    }
  };

  return (
    <div className="space-y-6 flex-1 max-w-3xl mx-auto w-full">
      <div className="text-left border-b border-gray-900 pb-3">
        <h2 className="text-xl font-display font-black tracking-wide text-white uppercase flex items-center gap-2"><Key size={22} className="text-gold-400" />API KEYS</h2>
        <p className="text-xs text-gray-400">Masukkan API key dari satu atau lebih provider AI. Key disimpan lokal di browser ini (localStorage) dan tidak pernah dikirim ke server manapun selain provider AI yang bersangkutan.</p>
      </div>

      <div className="bg-gold-950/10 border border-gold-500/20 rounded-lg p-3 text-[11px] text-gray-400 flex items-start gap-2">
        <ShieldCheck size={14} className="text-gold-400 shrink-0 mt-0.5" />
        <span>Provider yang dipilih sebagai <strong className="text-gold-300">AKTIF</strong> dicoba terlebih dahulu. Jika gagal (limit/quota/error), aplikasi otomatis mencoba provider lain yang sudah diisi key-nya.</span>
      </div>

      {['gemini', 'openrouter', 'groq', 'custom'].map((provider) => {
        const cfg = keys[provider];
        const meta = PROVIDER_META[provider];
        const isActive = keys.provider === provider;
        const status = testStatus[provider];
        return (
          <div key={provider} className={`glass-panel rounded-xl p-4 space-y-3 border ${isActive ? 'border-gold-500/50' : 'border-gray-900'}`}>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className={`w-2 h-2 rounded-full ${cfg.apiKey ? 'bg-emerald-400' : 'bg-gray-700'}`}></span>
                <h3 className="text-sm font-display font-bold text-white">{meta.label}</h3>
                {isActive && <span className="text-[9px] font-mono bg-gold-500 text-black px-1.5 py-0.5 rounded font-bold uppercase">Aktif</span>}
              </div>
              <button onClick={() => setActiveProvider(provider)} disabled={isActive} className={`text-[10px] font-mono px-2 py-1 rounded border ${isActive ? 'border-gray-800 text-gray-600 cursor-default' : 'border-gold-500/30 text-gold-400 hover:bg-gold-500/10'}`}>
                {isActive ? 'Provider Utama' : 'Jadikan Utama'}
              </button>
            </div>
            <p className="text-[11px] text-gray-500">{meta.hint} {meta.getKeyUrl && <a href={meta.getKeyUrl} target="_blank" rel="noreferrer" className="text-gold-400 underline">Dapatkan API key →</a>}</p>

            <div className="space-y-1">
              <label className="text-[10px] text-gray-400 uppercase font-bold font-mono block">API Key</label>
              <div className="flex items-center gap-2">
                <input
                  type={revealKey[provider] ? 'text' : 'password'}
                  value={cfg.apiKey}
                  onChange={(e) => setProviderField(provider, 'apiKey', e.target.value)}
                  placeholder={`Tempel ${meta.label} API key di sini...`}
                  className="flex-1 bg-black border border-gray-800 rounded-lg px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-gold-500/50 font-mono"
                />
                <button onClick={() => toggleReveal(provider)} className="p-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-400 hover:text-white shrink-0">
                  {revealKey[provider] ? <EyeOff size={14} /> : <Eye size={14} />}
                </button>
              </div>
            </div>

            {provider === 'custom' && (
              <div className="space-y-1">
                <label className="text-[10px] text-gray-400 uppercase font-bold font-mono block">Base URL (endpoint chat/completions)</label>
                <input
                  type="text"
                  value={cfg.baseUrl || ''}
                  onChange={(e) => setProviderField(provider, 'baseUrl', e.target.value)}
                  placeholder="https://api.contoh.com/v1/chat/completions"
                  className="w-full bg-black border border-gray-800 rounded-lg px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-gold-500/50 font-mono"
                />
              </div>
            )}

            <div className="space-y-1">
              <label className="text-[10px] text-gray-400 uppercase font-bold font-mono block">Model</label>
              <input
                type="text"
                value={cfg.model}
                onChange={(e) => setProviderField(provider, 'model', e.target.value)}
                placeholder={provider === 'custom' ? 'nama-model-di-provider-ini' : ''}
                className="w-full bg-black border border-gray-800 rounded-lg px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-gold-500/50 font-mono"
              />
            </div>

            <div className="flex items-center gap-2">
              <button onClick={() => testProvider(provider)} disabled={testing[provider] || !cfg.apiKey} className="px-3 py-1.5 rounded-lg bg-gray-900 border border-gray-800 text-xs text-gray-300 hover:text-white disabled:opacity-40 flex items-center gap-1.5">
                {testing[provider] ? <Loader2 size={12} className="animate-spin" /> : <RefreshCw size={12} />}
                <span>Test Koneksi</span>
              </button>
              {cfg.apiKey && (
                <button onClick={() => setProviderField(provider, 'apiKey', '')} className="px-3 py-1.5 rounded-lg bg-red-950/30 border border-red-500/20 text-xs text-red-400 hover:bg-red-950/50 flex items-center gap-1.5">
                  <Trash2 size={12} /><span>Hapus Key</span>
                </button>
              )}
              {status && (
                <span className={`text-[11px] font-mono flex items-center gap-1 ${status.ok ? 'text-emerald-400' : 'text-red-400'}`}>
                  {status.ok ? <Check size={12} /> : <AlertTriangle size={12} />} {status.msg}
                </span>
              )}
            </div>
          </div>
        );
      })}

      <div className="text-[10px] text-gray-600 font-mono text-center pt-2">
        Tips: gunakan tombol "Test Koneksi" setelah mengisi key untuk memastikan nama model masih valid sebelum melakukan scan chart.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
<script>
  // Manually transform + run the app source with the CLASSIC JSX runtime
  // (React.createElement calls) instead of Babel's automatic runtime,
  // which would otherwise inject an `import "react/jsx-runtime"`
  // statement that cannot execute as a plain, non-module script.
  (function () {
    var source = document.getElementById('app-source').textContent;
    try {
      var result = Babel.transform(source, {
        presets: [['react', { runtime: 'classic' }]],
        filename: 'app.jsx',
      });
      var script = document.createElement('script');
      script.text = result.code;
      document.body.appendChild(script);
    } catch (err) {
      document.getElementById('root').innerHTML =
        '<div style="color:#f87171;font-family:monospace;padding:24px;white-space:pre-wrap;">' +
        'Gagal memuat aplikasi (Babel transform error):\n' + (err && err.message ? err.message : err) +
        '</div>';
      console.error(err);
    }
  })();
</script>

<script>
  // Register the service worker so the app is installable and works
  // offline after the first visit. Requires HTTPS (or localhost) —
  // service workers never run over plain file:// or http://.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }

  // Optional "Install App" prompt handling (Android/desktop Chrome/Edge).
  // iOS Safari has no install prompt API — users add via Share ▸ Add to Home Screen.
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'inline-flex';
  });
  window.installRilGoldAI = async function () {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'none';
  };
</script>
